name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace backend

      - name: Lint backend
        run: npm run lint --workspace backend

      - name: Typecheck backend
        run: npm run typecheck --workspace backend

      - name: Test backend
        run: npm run test --workspace backend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Lint frontend
        run: npm run lint --workspace frontend

      - name: Test frontend
        run: npm run test --workspace frontend

      - name: Build frontend
        run: npm run build --workspace frontend

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # Root context (npm workspaces): the Dockerfiles need the root lockfile.
      - name: Build API image
        run: docker build -f backend/Dockerfile -t rawaqan-api .
      - name: Build web image
        run: docker build -f frontend/Dockerfile -t rawaqan-web .
