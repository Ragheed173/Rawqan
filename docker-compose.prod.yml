# ─── Rawaqan — full production stack ─────────────────────────
# Usage:
#   cp backend/.env.example backend/.env   # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The web container (Nginx) is the only public entrypoint; it reverse-proxies
# /api to the api container. Postgres is internal-only.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rawaqan}
    volumes:
      - rawaqan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rawaqan}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [rawaqan]

  api:
    build:
      # Root context so npm ci can use the workspace-root package-lock.json.
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      # Point the app at the db service regardless of what's in .env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rawaqan}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks: [rawaqan]
    expose:
      - '4000'

  web:
    build:
      # Root context so npm ci can use the workspace-root package-lock.json.
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-80}:80'
    networks: [rawaqan]

volumes:
  rawaqan_pgdata:

networks:
  rawaqan:
    driver: bridge
